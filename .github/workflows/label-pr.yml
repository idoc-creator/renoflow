name: Label PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];
            if (title.startsWith('feat')) labels.push('feature');
            if (title.startsWith('fix')) labels.push('bug');
            if (title.startsWith('chore') || title.startsWith('refactor')) labels.push('maintenance');
            if (title.includes('deps') || title.includes('dependabot')) labels.push('dependencies');
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            }
